<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js BIM SVG Export Demo</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background:#f5f5f5; color:#222; }
      #app { display:grid; grid-template-columns: 360px 1fr; min-height:100vh; }
      .panel { padding:16px; background:#fff; border-right:1px solid #ddd; overflow:auto; }
      .viewer { position:relative; }
      canvas { display:block; width:100%; height:100vh; }
      label { display:block; margin:12px 0 6px; font-weight:600; }
      input, select, button { width:100%; padding:8px; box-sizing:border-box; }
      button { cursor:pointer; margin-top:12px; }
      .row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
      .hint { font-size:12px; color:#666; margin-top:6px; }
      pre { white-space:pre-wrap; background:#fafafa; border:1px solid #eee; padding:10px; font-size:12px; }
      .download { display:inline-block; margin-top:10px; }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="panel">
        <h2>BIM SVG Export</h2>
        <p>Demo sahnesini yüksek çözünürlüklü raster katmanlara dönüştürür, backend'de SVG üretir.</p>

        <label>Scale factor</label>
        <input id="scaleFactor" type="number" min="1" max="8" step="1" value="4" />

        <label>Edge threshold angle</label>
        <input id="edgeThresholdAngle" type="number" min="1" max="90" step="1" value="15" />

        <div class="row">
          <div>
            <label>Include fills</label>
            <select id="includeFills">
              <option value="true" selected>true</option>
              <option value="false">false</option>
            </select>
          </div>
          <div>
            <label>Include shading</label>
            <select id="includeShading">
              <option value="false" selected>false</option>
              <option value="true">true</option>
            </select>
          </div>
        </div>

        <label>Edge vectorizer</label>
        <select id="edgeVectorizer">
          <option value="potrace" selected>potrace</option>
          <option value="vtracer">vtracer</option>
        </select>

        <label>Potrace alpha max</label>
        <input id="potraceAlphaMax" type="number" min="0" max="1.34" step="0.01" value="0" />

        <label>Potrace turd size</label>
        <input id="potraceTurdSize" type="number" min="0" max="50" step="1" value="3" />

        <label>Potrace opt tolerance</label>
        <input id="potraceOptTolerance" type="number" min="0" max="10" step="0.1" value="0" />

        <label>vtracer corner threshold</label>
        <input id="vtracerCornerThreshold" type="number" min="1" max="180" step="1" value="45" />

        <label>vtracer filter speckle</label>
        <input id="vtracerFilterSpeckle" type="number" min="0" max="50" step="1" value="3" />

        <label>vtracer color precision</label>
        <input id="vtracerColorPrecision" type="number" min="1" max="10" step="1" value="4" />

        <label>SVGO float precision</label>
        <input id="svgoFloatPrecision" type="number" min="0" max="6" step="1" value="2" />

        <button id="exportBtn">SVG üret</button>
        <div class="hint">Not: Potrace / vtracer kurulu değilse backend otomatik fallback vectorizer kullanır.</div>
        <pre id="status">Hazır.</pre>
        <a id="downloadLink" class="download" style="display:none;" download="export.svg">SVG indir</a>
      </div>
      <div class="viewer" id="viewer"></div>
    </div>
    <script type="module" src="/src/client/main.ts"></script>
  </body>
</html>
